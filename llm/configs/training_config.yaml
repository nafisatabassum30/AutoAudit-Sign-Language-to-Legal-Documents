# Default configuration for fine-tuning the Bangla-FIR LLM.
#
# Recommended base models (must be able to read/write Bangla reasonably
# well before fine-tuning -- fine-tuning teaches the *task*, not the
# language):
#   - Qwen/Qwen2.5-7B-Instruct        (ungated, strong multilingual incl. Bangla)
#   - meta-llama/Meta-Llama-3.1-8B-Instruct  (gated: requires HF license acceptance + token)
#   - google/gemma-2-9b-it             (gated: requires HF license acceptance)
#
# Any of these require a GPU with >= 16GB VRAM when using 4-bit QLoRA.
# For CPU-only smoke testing, override --model-name-or-path and
# --no-4bit on the command line (see scripts/smoke_test.sh).

model:
  name_or_path: "Qwen/Qwen2.5-7B-Instruct"
  load_in_4bit: true          # QLoRA. Requires a CUDA GPU + bitsandbytes. Ignored on CPU.
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"
  use_double_quant: true
  trust_remote_code: false

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: "all-linear"   # peft>=0.11 shorthand; falls back to explicit list if unsupported
  bias: "none"
  task_type: "CAUSAL_LM"

data:
  raw_path: "data/seed_dataset.jsonl"
  processed_dir: "data/processed"
  val_ratio: 0.15
  max_length: 768
  seed: 42

training:
  output_dir: "outputs/bangla-fir-lora"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.0
  logging_steps: 10
  eval_strategy: "epoch"
  save_strategy: "epoch"
  save_total_limit: 2
  bf16: true
  gradient_checkpointing: true
  report_to: "none"
